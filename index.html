<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO de base -->
    <title>Prestalya – Services à domicile de confiance en France</title>
    <meta name="description" content="Prestalya : trouvez des prestataires vérifiés près de chez vous. Ménage, babysitting, aide informatique, coiffure à domicile, plomberie, électricité et plus encore." />
    <meta name="keywords" content="prestataire à domicile, ménage, babysitting, aide informatique, coiffure domicile, plomberie, électricité, services domicile France" />
    <meta name="author" content="Prestalya" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://prestalya.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Prestalya" />
    <meta property="og:title" content="Prestalya – Services à domicile de confiance en France" />
    <meta property="og:description" content="Trouvez des prestataires vérifiés près de chez vous. Ménage, babysitting, aide informatique, coiffure à domicile et plus encore." />
    <meta property="og:url" content="https://prestalya.com/" />
    <meta property="og:image" content="https://prestalya.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@prestalya" />
    <meta name="twitter:title" content="Prestalya – Services à domicile de confiance" />
    <meta name="twitter:description" content="Trouvez des prestataires vérifiés près de chez vous en quelques clics." />
    <meta name="twitter:image" content="https://prestalya.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Préchargement police -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Données structurées – Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Prestalya",
      "url": "https://prestalya.com",
      "logo": "https://prestalya.com/logo.png",
      "description": "Plateforme de mise en relation entre particuliers et prestataires de services à domicile en France.",
      "foundingDate": "2024",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "12 rue de la Paix",
        "addressLocality": "Paris",
        "postalCode": "75002",
        "addressCountry": "FR"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+33-6-12-34-56-78",
        "contactType": "customer service",
        "availableLanguage": "French"
      },
      "sameAs": [
        "https://www.facebook.com/prestalya",
        "https://www.instagram.com/prestalya",
        "https://www.linkedin.com/company/prestalya"
      ]
    }
    </script>

    <!-- Données structurées – WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Prestalya",
      "url": "https://prestalya.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://prestalya.com/prestataires?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
